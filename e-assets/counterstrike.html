<head>
 <script>
   window.gameconfig = {
       name: "Call of Duty - Modern Warfare 3 - Defiance (USA)",
       url: "https://cdn.jsdelivr.net/gh/ecog-ent/ecog-emulator@main/Counter%20Strike%20DS%201.0.0.zip",
       core: "nds",
       min: 1,
       max: 4,
     };
 </script>
 <script>
   function mergeFiles(fileParts, cb) {
       return new Promise((resolve, reject) => {
         let buffers = [];
         function fetchPart(index) {
           if (index >= fileParts.length) {
             let mergedBlob = new Blob(buffers);
             let mergedFileUrl = URL.createObjectURL(mergedBlob);
             resolve(mergedFileUrl);
             return;
           }
           fetch(fileParts[index])
             .then((response) => response.arrayBuffer())
             .then((data) => {
               buffers.push(data);
               fetchPart(index + 1);
             })
             .catch(reject);
           cb(index);
         }
         fetchPart(0);
       });
     }
     function getParts(file, start, end) {
       let parts = [];
       for (let i = start; i <= end; i++) {
         parts.push(file + ".part" + i);
       }
       return parts;
     }
 </script>
 <style>
   body,
   html {
     margin: 0;
     padding: 0;
     display: flex;
     align-items: center;
     justify-content: center;
     width: 100%;
     height: 100%;
     background-color: #121212;
     color: white;
     font-family: Arial, sans-serif;
   }


   #game-container {
     text-align: center;
     width: 100%;
     height: 100%;
   }


   #loading-progress {
     font-size: 18px;
     margin-top: 20px;
     padding: 10px;
     background: rgba(255, 255, 255, 0.1);
     border-radius: 8px;
     display: inline-block;
   }
 </style>
</head>


<body>
 <div id="game-container">
   <div id="game"></div>
   <div id="loading-progress">Loading: 0/0</div>
   <div id="first-time">First-time loading may take longer...</div>
 </div>
 <script>
   var parts = getParts(
       window.gameconfig.url,
       window.gameconfig.min,
       window.gameconfig.max
     );
     var totalParts = parts.length;


     function updateLoadingProgress(loaded) {
       const progressElement = document.getElementById("loading-progress");
       if (loaded === 0) {
         progressElement.textContent = "Loading: 0/0";
       } else {
         progressElement.textContent = `Loading: ${loaded}/${totalParts}`;
       }
     }


     Promise.all([mergeFiles(parts, updateLoadingProgress)])
       .then(([gameUrl]) => {
         document.getElementById("loading-progress").remove();
         document.getElementById("first-time").remove();
         EJS_player = "#game";
         EJS_core = window.gameconfig.core;
         EJS_gameName = window.gameconfig.name;
         EJS_color = "#0064ff";
         EJS_startOnLoaded = true;
         EJS_pathtodata = "https://cdn.jsdelivr.net/gh/KingShedew/ecog-18@master/";
         EJS_gameUrl = gameUrl;
         const script = document.createElement("script");
         script.src =
           "https://cdn.jsdelivr.net/gh/KingShedew/ecog-18@main/loader.js";
         document.body.appendChild(script);
       })
       .catch((error) => {
         console.error(error);
         document.getElementById("loading-progress").textContent =
           "Error loading game.";
       });
 </script>
</body>
